<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep32Q 白名單管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e; color: #eee; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}
.container { max-width: 640px; width: 100%; padding: 40px 20px; }
h1 { font-size: 1.4rem; margin-bottom: 8px; color: #e0e0e0; }
p.sub { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
.card {
  background: #16213e; border-radius: 10px; padding: 24px;
  margin-bottom: 20px; border: 1px solid #2a2a4a;
}
.card h2 { font-size: 1rem; margin-bottom: 16px; color: #aaa; }
.form-row { display: flex; gap: 8px; }
.form-row input {
  flex: 1; padding: 10px 14px; border-radius: 6px; border: 1px solid #333;
  background: #0f3460; color: #eee; font-size: 0.9rem; outline: none;
}
.form-row input:focus { border-color: #4fc3f7; }
.form-row button {
  padding: 10px 20px; border-radius: 6px; border: none;
  background: #4fc3f7; color: #0a0a1a; font-weight: 600;
  cursor: pointer; font-size: 0.9rem; white-space: nowrap;
}
.form-row button:hover { background: #29b6f6; }
.form-row button:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; display: none; }
.msg.success { display: block; background: #1b5e20; color: #a5d6a7; }
.msg.error { display: block; background: #b71c1c; color: #ef9a9a; }
.msg.info { display: block; background: #1a237e; color: #90caf9; }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; padding: 10px 12px; font-size: 0.8rem; color: #777; border-bottom: 1px solid #2a2a4a; }
tbody td { padding: 10px 12px; border-bottom: 1px solid #222; font-size: 0.9rem; }
tbody tr:hover { background: rgba(79,195,247,0.05); }
td.email-col { word-break: break-all; }
td.action-col { width: 60px; text-align: center; }
.btn-del {
  background: transparent; border: 1px solid #c62828; color: #ef5350;
  padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem;
}
.btn-del:hover { background: #c62828; color: #fff; }
.btn-del:disabled { opacity: 0.3; cursor: not-allowed; }
.empty-row td { text-align: center; color: #555; padding: 30px 0; font-style: italic; }
.badge { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 0.7rem; background: #2e7d32; color: #a5d6a7; margin-left: 6px; }
#loading { text-align: center; padding: 40px 0; color: #666; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
  <h1>🔐 白名單管理</h1>
  <p class="sub">Email OTP 白名單 · 只有這些 email 能用 Email OTP 登入網站</p>

  <div id="msg" class="msg"></div>

  <div class="card">
    <h2>✚ 新增白名單</h2>
    <div class="form-row">
      <input type="email" id="emailInput" placeholder="user@example.com" autocomplete="off">
      <button id="addBtn" onclick="addEmail()">新增</button>
    </div>
  </div>

  <div class="card">
    <h2>📋 目前白名單 (<span id="count">0</span>)</h2>
    <div id="loading">載入中...</div>
    <table id="table" style="display:none">
      <thead><tr><th>Email</th><th class="action-col"></th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script src="/admin/whitelist.js"></script>
</body>
</html>
